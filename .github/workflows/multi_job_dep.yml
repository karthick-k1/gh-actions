name: Multiple Jobs

on:
  workflow_dispatch:

jobs:
  first_job:
    runs-on: ubuntu-latest
    steps:
      - name: OS release file
        run: cat /etc/os-release

  second_job:
    runs-on: ubuntu-latest
    needs: first_job
    steps:
      - name: sleep command
        run: sleep 60

  third_job:
    runs-on: ubuntu-latest
    needs: [first_job, second_job]
    steps:
      - name: print hello
        run: echo "Hello world"